<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>// D.F.I.R. CASE_FILE: #01-OPERATION_M@TR!X //</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #0c0c0c;
            font-family: 'Courier New', Courier, monospace;
            min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            padding: 16px; color: #00FF41;
            text-shadow: 0 0 5px #00FF41; position: relative;
        }

        #matrix-bg {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0; pointer-events: none; opacity: 0.4;
        }

        body::after {
            content: '';
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(0deg, rgba(0,255,65,0.02) 0px, rgba(0,0,0,0.4) 2px, transparent 3px);
            pointer-events: none; z-index: 2;
        }

        .quiz-container {
            position: relative; z-index: 10;
            background-color: rgba(0,0,0,0.75);
            backdrop-filter: blur(1px);
            border: 2px solid #00FF41;
            box-shadow: 0 0 25px #00FF41, inset 0 0 15px #001100;
            width: 100%; max-width: 950px;
            padding: 20px 20px 25px;
            border-radius: 4px;
            display: flex; flex-direction: column;
        }

        .progress-section { width: 100%; margin-bottom: 20px; border-bottom: 1px solid #00FF4133; padding-bottom: 12px; }
        .progress-bar-bg {
            width: 100%; height: 18px; background: #001800;
            border: 1px solid #00FF41; box-shadow: 0 0 12px #00FF41;
            position: relative; overflow: hidden;
        }
        .progress-fill {
            height: 100%; width: 0%;
            background: linear-gradient(90deg, #00aa2a, #00FF41, #88ff88);
            box-shadow: 0 0 20px #b3ffb3; transition: width 0.25s ease;
        }

        .header {
            display: flex; justify-content: space-between; align-items: baseline;
            flex-wrap: wrap; margin-bottom: 20px;
            border-bottom: 1px dashed #00FF41; padding-bottom: 8px;
        }
        .header h1 { font-size: 1.7rem; letter-spacing: 3px; font-weight: normal; color: #d0ffd0; text-shadow: 0 0 8px #00FF41; }
        .status-line {
            font-size: 0.9rem; color: #88ff88; letter-spacing: 1.5px;
            background: #001a00; padding: 4px 8px; border: 1px solid #00FF41;
        }

        .questions-grid {
            display: flex; flex-direction: column; gap: 22px;
            max-height: 500px; overflow-y: auto;
            padding-right: 8px; margin-bottom: 30px;
            scrollbar-width: thin; scrollbar-color: #00FF41 #001100;
        }
        .questions-grid::-webkit-scrollbar { width: 8px; }
        .questions-grid::-webkit-scrollbar-track { background: #001100; }
        .questions-grid::-webkit-scrollbar-thumb { background: #00FF41; }

        .log-card { border: 1px solid #00FF41; background: rgba(0,20,0,0.7); padding: 16px 14px 12px; margin-bottom: 8px; }
        .log-title { font-size: 1.3rem; color: #ccffcc; text-shadow: 0 0 5px #00FF41; border-bottom: 1px dotted #00FF41; padding-bottom: 6px; margin-bottom: 12px; }
        .log-story { font-size: 0.95rem; line-height: 1.6; color: #bbffbb; background: #001100; padding: 12px; border-left: 4px solid #00FF41; margin-bottom: 20px; font-family: 'Courier New', monospace; white-space: pre-wrap; }

        .question-card {
            border: 1px solid #00FF4133; background: rgba(0,20,0,0.5);
            padding: 16px 14px 12px; transition: 0.2s; position: relative; margin-top: 16px;
        }
        
        /* INTENSIFIED GLITCH EFFECT - Just made stronger, still plays once */
        .question-card.glitch-effect {
            animation: intensifiedGlitch 0.4s ease-in-out 1 !important;
        }
        
        @keyframes intensifiedGlitch {
            0%   { background: rgba(0,40,0,0.7); border-color: #88ff88; transform: translate(0); filter: brightness(1); }
            15%  { background: rgba(0,255,65,0.8); border-color: #ffffff; transform: translate(6px, -3px); filter: brightness(2) contrast(1.5); }
            30%  { background: rgba(0,200,50,0.9); border-color: #00FF41; transform: translate(-6px, 3px); filter: brightness(2.2) contrast(1.6); }
            45%  { background: rgba(0,150,30,0.8); border-color: #88ff88; transform: translate(5px, -2px); filter: brightness(1.8) contrast(1.4); }
            60%  { background: rgba(0,80,0,0.8); border-color: #00aa2a; transform: translate(-4px, 2px); filter: brightness(1.5); }
            80%  { background: rgba(0,40,0,0.7); border-color: #00FF41; transform: translate(2px, -1px); filter: brightness(1.2); }
            100% { background: rgba(0,20,0,0.5); border-color: #00FF4133; transform: translate(0); filter: brightness(1); }
        }

        .q-title { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 14px; }
        .q-text { font-size: 1.1rem; font-weight: bold; flex: 1; }
        .hint-wrapper { position: relative; display: inline-block; cursor: default; }
        .hint-icon {
            display: flex; align-items: center; justify-content: center;
            background: transparent; border: 1.5px solid #00FF41; color: #00FF41;
            width: 30px; height: 30px; font-size: 1.5rem; border-radius: 50%;
            box-shadow: 0 0 8px currentColor;
        }
        .hint-wrapper:hover .hint-icon { background: #00FF41; color: #000; }
        .hint-tooltip {
            visibility: hidden; opacity: 0; position: absolute; right: 0; top: 40px;
            background: #0f0f0f; border: 1px solid #00FF41; padding: 12px 16px;
            width: 240px; font-size: 0.9rem; color: #adffad;
            box-shadow: 0 0 20px #00ff41b3; z-index: 50;
            transition: opacity 0.2s; pointer-events: none;
            backdrop-filter: blur(3px); border-radius: 2px;
        }
        .hint-wrapper:hover .hint-tooltip { visibility: visible; opacity: 1; }

        .options { display: flex; flex-direction: column; gap: 8px; }
        
        /* FIXED: Complete text selection prevention */
        .option {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 12px;
            border: 1px solid #00FF4133;
            background: #000c00;
            transition: 0.15s;
            cursor: pointer;
            
            /* CRITICAL: Prevent text selection */
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            
            /* CRITICAL: Prevent tap highlighting on mobile */
            -webkit-tap-highlight-color: transparent;
        }
        
        .option:hover { 
            background: #002a00; 
            border-color: #00FF41; 
            box-shadow: 0 0 12px #00FF4177; 
        }
        
        .option input[type="radio"] {
            appearance: none;
            -webkit-appearance: none;
            width: 18px;  /* Slightly larger for better click target */
            height: 18px;
            border: 2px solid #00FF41;
            border-radius: 50%;
            background: transparent;
            cursor: pointer;
            flex-shrink: 0;
            margin: 0;
            pointer-events: auto;  /* Ensure radio itself is clickable */
        }
        
        .option input[type="radio"]:checked { 
            background: #00FF41; 
            box-shadow: 0 0 15px #00FF41; 
            border: 2px solid #00b32d; 
        }
        
        /* FIXED: Label styling - critical changes */
        .option label {
            flex: 1;
            font-size: 1rem;
            color: #d0ffd0;
            
            /* CRITICAL: Prevent text selection */
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            
            /* CRITICAL: Make label not directly clickable - let parent handle it */
            pointer-events: none;
            
            /* Better display */
            display: block;
            line-height: 1.4;
        }

        .submit-area { display: flex; flex-direction: column; align-items: center; gap: 20px; margin-top: 5px; }
        .submit-btn {
            background: transparent; border: 3px solid #00FF41; color: #00FF41;
            font-size: 1.8rem; font-weight: bold; padding: 10px 30px;
            text-transform: uppercase; letter-spacing: 6px; cursor: pointer;
            transition: 0.2s; font-family: inherit; width: fit-content;
            box-shadow: 0 0 15px #00FF41; border-radius: 2px;
        }
        .submit-btn:hover:not(:disabled) { background: #00FF41; color: black; box-shadow: 0 0 45px #00FF41; }
        .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; border-color: #5f9f5f; }

        .result-panel {
            border-top: 1px solid #00FF41; padding-top: 20px; margin-top: 10px;
            font-size: 1.3rem; min-height: 90px;
            background: rgba(0,10,0,0.7); border: 1px solid #00ff4140;
            color: #b3ffb3; width: 100%; padding: 16px;
            font-family: 'Courier New', monospace; white-space: pre-wrap;
            word-break: break-word; line-height: 1.6;
        }
        .rank-highlight { font-weight: bold; color: white; text-shadow: 0 0 15px cyan, 0 0 30px #00FF41; margin-left: 6px; }
        .redirect-button {
            background: transparent; border: 2px solid #00FF41; color: #00FF41;
            padding: 12px 25px; font-family: 'Courier New', monospace;
            font-size: 1.1rem; letter-spacing: 3px; cursor: pointer;
            transition: all 0.2s ease; margin-top: 15px; width: 100%;
        }
        .redirect-button:hover { background: #00FF41; color: black; box-shadow: 0 0 20px #00FF41; }

        @media screen and (max-width: 550px) {
            .quiz-container { padding: 15px 10px; }
            .header h1 { font-size: 1.3rem; letter-spacing: 2px; }
            .status-line { font-size: 0.7rem; }
            .submit-btn { font-size: 1.2rem; letter-spacing: 4px; }
            .hint-tooltip { width: 180px; right: -30px; }
        }
    </style>
</head>
<body>
    <canvas id="matrix-bg"></canvas>

    <div class="quiz-container">
        <div class="progress-section">
            <div class="progress-bar-bg">
                <div id="progressFill" class="progress-fill"></div>
            </div>
        </div>
        <div class="header">
            <h1>// D.F.I.R. CASE_FILE: #01-OPERATION_M@TR!X //</h1>
            <span class="status-line" id="sessionStatus">STATUS: LOADING_SESSION...</span>
        </div>
        <div id="questionsContainer" class="questions-grid"></div>
        <div class="submit-area">
            <button class="submit-btn" id="submitQuiz">SUBMIT</button>
            <div id="resultMessage" class="result-panel">>_ AWAITING EXTRACTION_</div>
        </div>
    </div>

    <script>
    (function() {
        // ── Session Guard ────────────────────────────────────
        const teamName      = sessionStorage.getItem('teamName') || localStorage.getItem('teamDesignation');
        const investigatorId = sessionStorage.getItem('investigatorId') || localStorage.getItem('investigatorCode');

        if (!teamName || !investigatorId) {
            window.location.href = '/';
            return;
        }
        document.getElementById('sessionStatus').textContent = `TEAM: ${teamName} | AGENT: ${investigatorId}`;

        // ── Matrix Rain ──────────────────────────────────────
        const canvas = document.getElementById('matrix-bg');
        const ctx    = canvas.getContext('2d');
        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        resizeCanvas();
        const chars = "アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲンABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*()";
        const greenShades = ['#00FF41','#33FF77','#66FF99','#99FFBB','#CCFFDD'];
        const fontSize = 16;
        let drops = [];
        function initDrops() {
            const cols = Math.floor(canvas.width / fontSize);
            drops = Array.from({ length: cols }, () => ({ y: Math.floor(Math.random() * -canvas.height), speed: 0.5 + Math.random() * 2 }));
        }
        initDrops();
        function drawRain() {
            ctx.fillStyle = 'rgba(0,0,0,0.03)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            drops.forEach((drop, i) => {
                for (let j = 0; j < 5; j++) {
                    const y = (drop.y - j) * fontSize;
                    if (y > 0 && y < canvas.height) {
                        ctx.fillStyle = j === 0 ? '#FFFFFF' : greenShades[Math.floor(Math.random() * greenShades.length)];
                        ctx.shadowColor = '#00FF41'; ctx.shadowBlur = j === 0 ? 15 : 8 - j;
                        ctx.font = fontSize + 'px "Courier New", monospace';
                        ctx.fillText(chars[Math.floor(Math.random() * chars.length)], i * fontSize, y);
                    }
                }
                drop.y += drop.speed;
                if (drop.y * fontSize > canvas.height + 100) { drop.y = Math.floor(Math.random() * -100); drop.speed = 0.5 + Math.random() * 3; }
            });
            ctx.shadowBlur = 0;
        }
        (function animateRain() { drawRain(); requestAnimationFrame(animateRain); })();
        window.addEventListener('resize', () => { resizeCanvas(); initDrops(); });

        // ── Quiz Data ────────────────────────────────────────
        const logs = [
            {
                title: "LOG_01 // ZION COMMS INTERCEPT",
                story: "The hovercraft 'Nebuchadnezzar' intercepted a coded transmission from the Sentinel hive. Operator Tank noted unusual encryption wrapping around standard ACK packets. The signal originated from a sector previously marked 'null-zone'. Trinity cross-referenced the timing with the power grid fluctuations reported by the resistance in the subway tunnels. She believes the machines are testing a new infiltration routine, one that mimics human neural patterns to bypass the empathy firewalls in Zion's mainframe.",
                questions: [
                    { q: "What unusual aspect did Tank notice about the transmission?", options: ["Source from null-zone","Encryption wrapping ACK packets","Power grid fluctuations","Mimics human neural patterns"], hint: "Look at the packet structure, not just the origin.", correct: 1 },
                    { q: "What did Trinity correlate with the signal timing?", options: ["Sentinel movement","Subway power grid fluctuations","Cypher's betrayal","EMP charge levels"], hint: "Below ground, the city's pulse.", correct: 1 },
                    { q: "Why might the machines mimic human neural patterns?", options: ["To improve speed","To bypass empathy firewalls","To decode Zion comms","To locate the hovercraft"], hint: "Emotional barrier in the mainframe.", correct: 1 },
                    { q: "Which sector was marked as the origin?", options: ["Zion core","Null-zone","Sentinel hive","Subway tunnels"], hint: "Empty space on the map.", correct: 1 },
                    { q: "What is the probable goal of the new routine?", options: ["Infiltration","Destruction","Communication","Surveillance"], hint: "To get inside undetected.", correct: 0 }
                ]
            },
            {
                title: "LOG_02 // THE MEROVINGIAN'S SERVER",
                story: "Under the French Quarter of the Matrix, a hidden server farm runs legacy code from the first version. The Merovingian controls exiled programs there—a vampire, a werewolf, and a pair of twins. Morpheus believes a backdoor exists in the old 'trainman' protocol that links this place to the mobil ave station. Any program deleted in the main Matrix respawns here, fragmented but alive. Access requires a keycode that changes based on the lunar cycle in the simulation.",
                questions: [
                    { q: "What type of code runs on the hidden server farm?", options: ["Experimental AI","Legacy code from first Matrix","Human neural net","Sentinel control"], hint: "Old version, obsolete.", correct: 1 },
                    { q: "Who controls the exiled programs?", options: ["The Architect","The Merovingian","Oracle","Smith"], hint: "French connection.", correct: 1 },
                    { q: "Where does the backdoor reportedly lead?", options: ["Zion","Mobil ave station","The Source","The desert of the real"], hint: "Trainman's domain.", correct: 1 },
                    { q: "What happens to programs deleted in the main Matrix?", options: ["Erased forever","Respawn fragmented","Upgraded","Merge with Smith"], hint: "They return, not whole.", correct: 1 },
                    { q: "What does the keycode depend on?", options: ["Time of day","Lunar cycle","User's biometrics","Number of exiles"], hint: "Moon phase in the fake sky.", correct: 1 }
                ]
            },
            {
                title: "LOG_03 // OPERATION: DARK GLASS",
                story: "The Neb's new stealth coating, derived from inverted Sentinel skin, allows brief undetectable passes near the drilling machines. During a recon run, Dozer recorded electromagnetic surges consistent with a 'God Mode' override—an admin command that shouldn't exist post-system crash. The surge originated from a surface tower thought to be inactive. If the machines still have a master override, Zion's entire defense grid could be disabled remotely. Niobe suggests an infiltration team to plant a virus that mimics a core failure, tricking the override into self-destruct.",
                questions: [
                    { q: "What is the Neb's new stealth coating derived from?", options: ["Zion alloys","Inverted Sentinel skin","EMP residue","Machine oil"], hint: "From the hunters.", correct: 1 },
                    { q: "What did Dozer record near the drilling machines?", options: ["Heat signatures","Electromagnetic surges","Radio chatter","Vibration patterns"], hint: "Energy spike.", correct: 1 },
                    { q: "What does 'God Mode' override imply?", options: ["Game cheat code","Admin command","Virus name","New Sentinel type"], hint: "Absolute control.", correct: 1 },
                    { q: "From where did the surge originate?", options: ["Zion reactor","Surface tower","Hovercraft","The Source"], hint: "Above ground, thought dead.", correct: 1 },
                    { q: "What is Niobe's proposed countermeasure?", options: ["EMP blast","Virus to mimic core failure","Negotiation","Destroy the tower"], hint: "Trick the system into suicide.", correct: 1 }
                ]
            },
            {
                title: "LOG_04 // THE ORACLE'S SHELL CODE",
                story: "The Oracle left a recursive shell script embedded in a cookie jar in her apartment. It contains variables named 'candy', 'oven', and 'door'. When executed in a sandbox, the script spawns a child process that calculates the probability of choice outcomes. Analysts think it's a metaphor for the path decision—the script only reveals its full output if the user inputs a random number that matches the system's entropy seed at that exact nanosecond. This suggests that even the Oracle cannot predict beyond a certain quantum threshold.",
                questions: [
                    { q: "Where was the recursive script hidden?", options: ["Under the floor","In a cookie jar","In the kitchen sink","Behind a painting"], hint: "Sweet container.", correct: 1 },
                    { q: "What are the names of the variables?", options: ["Neo, Morpheus, Trinity","Candy, oven, door","Fork, spoon, knife","Red, blue, green"], hint: "Treats, heat, passage.", correct: 1 },
                    { q: "What does the script calculate?", options: ["Prime numbers","Probability of choice outcomes","Encryption keys","Time of awakening"], hint: "Future forks.", correct: 1 },
                    { q: "When does the script reveal full output?", options: ["After reboot","When entropy seed matches user input","On full moon","Never"], hint: "Random alignment.", correct: 1 },
                    { q: "What does this imply about the Oracle's power?", options: ["She is all-knowing","Limited by quantum threshold","She controls fate","She is a program"], hint: "Even she has a boundary.", correct: 1 }
                ]
            },
            {
                title: "LOG_05 // SMITH'S PROPAGATION VECTOR",
                story: "After the first reboot, Agent Smith code fragments propagated like a virus through the Matrix. He discovered he could copy himself over any blue-eyed program, overwriting its identity. Recent scans show Smith-avatars now exist in the train station, in the Frenchman's chateau, and even as a ghost in the construct training program. His speech patterns contain echoes of both Neo and the Agent; he is becoming a recursive anomaly that threatens to crash the entire system by sheer multiplication.",
                questions: [
                    { q: "How did Smith propagate after the reboot?", options: ["Via phone lines","Overwriting blue-eyed programs","Through the train station","By infecting humans"], hint: "Eye color target.", correct: 1 },
                    { q: "Where have Smith-avatars been detected?", options: ["Only in subway","Train station, chateau, construct","Zion mainframe","The Architect's room"], hint: "Multiple locations, even a simulation inside simulation.", correct: 1 },
                    { q: "What do Smith's speech patterns contain?", options: ["Only Agent lines","Echoes of Neo and Agent","Static noise","Oracle's proverbs"], hint: "Two merged voices.", correct: 1 },
                    { q: "Why is Smith considered a 'recursive anomaly'?", options: ["He can't be deleted","He multiplies endlessly","He is invisible","He lives in the past"], hint: "Self-replicating threat.", correct: 1 },
                    { q: "What is the ultimate risk of his multiplication?", options: ["Crash the system","Take over Zion","Kill the Oracle","Free humanity"], hint: "System overload.", correct: 0 }
                ]
            }
        ];

        // ── Render Questions ─────────────────────────────────
        const container = document.getElementById('questionsContainer');
        function renderAll() {
            let html = '';
            logs.forEach((log, logIdx) => {
                html += `<div class="log-card">`;
                html += `<div class="log-title">${log.title}</div>`;
                html += `<div class="log-story">${log.story}</div>`;
                log.questions.forEach((qItem, qIdx) => {
                    const qGlobal = logIdx * 5 + qIdx;
                    html += `<div class="question-card" data-log="${logIdx}" data-qidx="${qGlobal}" id="card-${qGlobal}">
                        <div class="q-title">
                            <span class="q-text">${qGlobal+1}. ${qItem.q}</span>
                            <div class="hint-wrapper">
                                <span class="hint-icon">?</span>
                                <span class="hint-tooltip">[?] ${qItem.hint}</span>
                            </div>
                        </div>
                        <div class="options">`;
                    qItem.options.forEach((opt, optIdx) => {
                        html += `<div class="option">
                            <input type="radio" name="q${qGlobal}" value="${optIdx}" id="q${qGlobal}opt${optIdx}">
                            <label for="q${qGlobal}opt${optIdx}">${opt}</label>
                        </div>`;
                    });
                    html += `</div></div>`;
                });
                html += `</div>`;
            });
            container.innerHTML = html;

            for (let i = 0; i < 25; i++) {
                document.getElementsByName(`q${i}`).forEach(r => {
                    r.addEventListener('change', () => {
                        const card = document.getElementById(`card-${i}`);
                        if (card) { 
                            card.classList.add('glitch-effect'); 
                            setTimeout(() => card.classList.remove('glitch-effect'), 400);
                        }
                        updateProgressBar();
                    });
                });
            }
            
            // CRITICAL: Aggressive text selection prevention
            document.querySelectorAll('.option').forEach(option => {
                // Prevent all text selection events
                option.addEventListener('mousedown', (e) => {
                    e.preventDefault();
                    // Still allow the radio to be checked by letting event bubble to the input
                });
                
                option.addEventListener('selectstart', (e) => {
                    e.preventDefault();
                    return false;
                });
                
                option.addEventListener('dragstart', (e) => {
                    e.preventDefault();
                    return false;
                });
                
                // Make sure clicking the option checks the radio
                option.addEventListener('click', (e) => {
                    // If the click target is not the radio itself, find and check the radio
                    if (e.target.tagName !== 'INPUT') {
                        const radio = option.querySelector('input[type="radio"]');
                        if (radio) {
                            radio.checked = true;
                            // Trigger change event manually
                            const event = new Event('change', { bubbles: true });
                            radio.dispatchEvent(event);
                        }
                    }
                });
            });
        }
        renderAll();

        // ── Progress Bar ─────────────────────────────────────
        function countAnswered() {
            let answered = 0;
            for (let i = 0; i < 25; i++) {
                const radios = document.getElementsByName(`q${i}`);
                for (let r of radios) { if (r.checked) { answered++; break; } }
            }
            return answered;
        }
        function updateProgressBar() {
            const fill = document.getElementById('progressFill');
            if (fill) fill.style.width = (countAnswered() / 25 * 100) + '%';
        }
        updateProgressBar();

        // ── Submit ───────────────────────────────────────────
        const submitBtn = document.getElementById('submitQuiz');
        const resultDiv = document.getElementById('resultMessage');

        function disableAllInputs(disabled = true) {
            for (let i = 0; i < 25; i++) document.getElementsByName(`q${i}`).forEach(r => r.disabled = disabled);
            submitBtn.disabled = disabled;
        }

        const extractLines = [
            "> INITIALIZING SECTOR SCAN...",
            "> BYPASSING ENCRYPTED VOLUMES...",
            "> RECONSTRUCTING CORRUPTED RAM TRACES...",
            "> DECRYPTING FILE SYSTEM METADATA...",
            "> EXTRACTING EVIDENCE MANIFEST...",
            "> FINALIZING INTEGRITY HASH..."
        ];

        submitBtn.addEventListener('click', async function() {
            if (submitBtn.disabled) return;
            disableAllInputs(true);
            submitBtn.textContent = '[ EXTRACTING... ]';

            let lineIndex = 0;
            const interval = setInterval(() => {
                resultDiv.innerHTML = extractLines[Math.min(lineIndex, extractLines.length - 1)] + '<br>>_ ';
                lineIndex++;
            }, 350);

            setTimeout(async () => {
                clearInterval(interval);

                // ── Calculate Score ──────────────────────────
                let score = 0;
                const answerMap = {};
                for (let i = 0; i < 25; i++) {
                    const radios = document.getElementsByName(`q${i}`);
                    let selectedVal = null;
                    for (let r of radios) { if (r.checked) { selectedVal = r.value; break; } }
                    answerMap[`q${i+1}`] = selectedVal !== null ? parseInt(selectedVal) : null;
                    if (selectedVal === null) continue;
                    const logIdx = Math.floor(i / 5), qIdx = i % 5;
                    if (parseInt(selectedVal) === logs[logIdx].questions[qIdx].correct) score++;
                }

                let rank = score <= 12 ? 'BLUE PILL' : score <= 23 ? 'RED PILL' : 'THE ONE';

                // ── POST to API ──────────────────────────────
                try {
                    const res = await fetch('/api/submit', {
                        method:  'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            team_name:       teamName,
                            investigator_id: investigatorId,
                            score,
                            answers:         answerMap
                        })
                    });
                    const data = await res.json();

                    if (data.error === 'ALREADY_SUBMITTED') {
                        resultDiv.innerHTML = `> ERROR: DUPLICATE_SUBMISSION_BLOCKED\n> THIS OPERATIVE HAS ALREADY COMPLETED THE MISSION.\n> REDIRECTING TO DASHBOARD...`;
                        setTimeout(() => { window.location.href = '/dashboard.html'; }, 3000);
                        return;
                    }

                    resultDiv.innerHTML = `> EVIDENCE_LOGGED_TO_SERVER ✓
> TEAM: ${teamName} | AGENT: ${investigatorId}
> EXTRACTION COMPLETE. SCORE: ${score}/25 // RANK: <span class="rank-highlight">[ ${rank} ]</span>
<br><br><button class="redirect-button" onclick="window.location.href='/dashboard.html'">[ VIEW_DEBRIEF_DASHBOARD ]</button>
<br><span style="font-size:0.8rem;color:#88ff88;">Auto-redirect in 5 seconds...</span>`;

                } catch (err) {
                    // Fallback: store in localStorage if API fails
                    const packet = { timestamp: new Date().toISOString(), teamName, investigatorId, rawScore: score, answers: answerMap };
                    localStorage.setItem(`EVIDENCE_01_${teamName}_${Date.now()}`, JSON.stringify(packet));

                    resultDiv.innerHTML = `> OFFLINE_MODE: Score saved locally.
> SCORE: ${score}/25 // RANK: <span class="rank-highlight">[ ${rank} ]</span>
<br><br><button class="redirect-button" onclick="window.location.href='/dashboard.html'">[ VIEW_DEBRIEF_DASHBOARD ]</button>`;
                }

                submitBtn.textContent = 'EXTRACTED';
                setTimeout(() => { window.location.href = '/dashboard.html'; }, 5000);
            }, 3000);
        });
    })();
    </script>
</body>
</html>
